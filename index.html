<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="13 Pimpala">
<meta name="theme-color" content="#0b0e14">
<title>13 Pimpala Court, Wantirna — Knockdown-Rebuild Study</title>
<meta name="description" content="Researched knockdown-rebuild feasibility for 13 Pimpala Court Wantirna: real cadastral siting, surveyed street context, NRZ4 compliance, 54-square two-storey concept, costs and timeline. EN / 简体 / 繁體.">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🏠</text></svg>">
</head>
<body>

<!-- ================= HERO / 3D ================= -->
<div id="hero">
  <canvas id="c3d"></canvas>
  <div id="loading">building model from cadastral data…</div>
  <div class="hero-title">
    <h1>13 Pimpala Court, Wantirna</h1>
    <p id="heroSubtitle"></p>
  </div>
  <div class="hero-hint" id="heroHint"></div>
  <div class="hud">
    <div class="hud-row" id="viewBtns"></div>
    <div class="hud-row sunrow">
      <span id="sunTag">SUN</span>
      <input type="range" id="sunSlider" min="7" max="19" step="0.5" value="10.5">
      <span id="sunLabel">10:30</span>
      <span class="note" id="sunNote"></span>
    </div>
  </div>
  <div id="statbar"></div>
  <div id="scrollCue"></div>
</div>

<nav id="topnav">
  <span class="brand">13 PIMPALA</span>
  <div id="navLinks"></div>
  <div id="langSwitch"></div>
</nav>

<!-- ================= 01 SITE ================= -->
<section id="site">
  <div class="kicker" id="siteKicker"></div>
  <h2 id="siteH2"></h2>
  <p class="lede" id="siteLede"></p>
  <div class="grid2">
    <svg id="sitePlan" class="plan reveal"></svg>
    <div>
      <div class="card reveal"><h3 id="factsTitle"></h3><div id="factList"></div></div>
      <div class="card reveal" style="margin-top:18px">
        <h3 id="compTitle"></h3><div id="compList"></div>
        <p class="small muted" style="margin-top:10px" id="marketLine"></p>
      </div>
    </div>
  </div>
</section>

<!-- ================= 02 RULES ================= -->
<section id="rules">
  <div class="kicker" id="rulesKicker"></div>
  <h2 id="rulesH2"></h2>
  <p class="lede" id="rulesLede"></p>
  <table id="rulesTable" class="reveal"><thead></thead><tbody></tbody></table>
</section>

<!-- ================= 03 DESIGN ================= -->
<section id="design">
  <div class="kicker" id="designKicker"></div>
  <h2 id="designH2"></h2>
  <p class="lede" id="designLede"></p>
  <div class="grid3">
    <div class="card reveal"><h3 id="accomTitle"></h3><ul id="accomList"></ul></div>
    <div class="card reveal"><h3 id="areasTitle"></h3><div id="areaList"></div></div>
    <div class="card reveal"><h3 id="exclTitle"></h3><ul id="exclList"></ul>
      <p class="small muted" style="margin-top:10px" id="exclNote"></p></div>
  </div>
</section>

<!-- ================= 04 PLANS ================= -->
<section id="plans">
  <div class="kicker" id="plansKicker"></div>
  <h2 id="plansH2"></h2>
  <p class="small muted" id="roomNote"></p>
  <div class="grid2">
    <svg id="groundPlan" class="plan reveal"></svg>
    <svg id="upperPlan" class="plan reveal"></svg>
  </div>
</section>

<!-- ================= 05 COSTS ================= -->
<section id="costs">
  <div class="kicker" id="costsKicker"></div>
  <h2 id="costsH2"></h2>
  <p class="lede" id="costLede"></p>
  <table id="costTable" class="reveal"><thead></thead><tbody></tbody><tfoot></tfoot></table>
  <h3 style="font-family:var(--serif);font-weight:500;margin-top:42px" id="payTitle"></h3>
  <div id="payments"></div>
  <div class="card reveal" style="margin-top:26px"><h3 id="feasTitle"></h3><p id="feasibility"></p></div>
</section>

<!-- ================= 06 TIMELINE ================= -->
<section id="timeline">
  <div class="kicker" id="tlKicker"></div>
  <h2 id="tlH2"></h2>
  <p class="lede" id="tlLede"></p>
  <svg id="gantt" class="plan reveal" style="margin-top:30px"></svg>
  <div class="card reveal" style="margin-top:20px"><div id="tlDetails"></div></div>
</section>

<!-- ================= 07 PROCESS ================= -->
<section id="process">
  <div class="kicker" id="procKicker"></div>
  <h2 id="procH2"></h2>
  <div class="steps" id="stepList"></div>
</section>

<!-- ================= 08 SOURCES ================= -->
<section id="sources">
  <div class="kicker" id="srcKicker"></div>
  <h2 id="srcH2"></h2>
  <div id="srcList" style="margin-top:26px"></div>
  <div class="disclaimer" id="disclaimer"></div>
</section>

<footer id="footerLine"></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/data_geometry.js"></script>
<script src="js/data.js"></script>
<script src="js/i18n.js"></script>
<script src="js/plans.js"></script>
<script src="js/site3d.js"></script>
<script src="js/main.js"></script>
</body>
</html>
